<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redireciona rotas SPA para index.html preservando o path
      const repo = '/Arphia-Docs';
      const path = window.location.pathname.replace(repo, '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(repo + '/?redirect=' + encodeURIComponent(path + search + hash));
    </script>
  </head>
</html>
