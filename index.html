
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Arphia Docs - Damatools</title>
      <meta name="description" content="This web application offers a visually engaging platform for users to explore comprehensive architectural overviews and documentation, enhancing understanding and accessibility." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // Restaura rota SPA redirecionada pelo 404.html
        (function () {
          var redirect = new URLSearchParams(window.location.search).get('redirect');
          if (redirect) {
            history.replaceState(null, '', redirect);
          }
        })();
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
